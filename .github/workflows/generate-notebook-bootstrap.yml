name: Generate Notebook Bootstrap

on:
  workflow_dispatch:
    inputs:
      notebook_name:
        description: "Notebook filename (example.ipynb)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Generate bootstrap script
        run: |
          python .github/scripts/generate_notebook_bootstrap.py \
            --notebook-name "${{ inputs.notebook_name }}"

      - name: Commit bootstrap script to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add notebooks/**/bootstrap_*.py notebooks/**/*.refdata.yml

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add bootstrap script for ${{ inputs.notebook_name }}"
            git push origin main
          fi
